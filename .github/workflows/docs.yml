name: Docs

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  markdown:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            **/*.md

  links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --accept 200,206,429 "./**/*.md"

  validate-convention:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install validator dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml jsonschema pytest

      - name: Run validator test suite
        run: python -m pytest tests/ -q

      - name: Validate core examples
        run: |
          python skills/ea-convention/scripts/validate_convention.py \
            --root . \
            --schema-dir schemas \
            --initiatives examples/core/enterprise-repo/initiatives.yml \
            --workstreams examples/core/solution-repo/domain-workstreams.yml \
            --da-root examples/core/domain-repo

      - name: Validate governed examples
        run: |
          python skills/ea-convention/scripts/validate_convention.py \
            --root . \
            --schema-dir schemas \
            --initiatives examples/governed/enterprise-repo/initiatives.yml \
            --domain-registry examples/governed/enterprise-repo/domain-registry.yml \
            --solution-index examples/governed/solution-repo/solution-index.yml \
            --workstreams examples/governed/solution-repo/domain-workstreams.yml \
            --da-root examples/governed/domain-repo

      - name: Check starter pack header contract
        run: |
          python scripts/check_catalog_headers.py \
            packs/ea/architecture/portfolio/initiatives.yml \
            packs/ea/architecture/enterprise/domain-registry.yml \
            packs/sa/architecture/solution/domain-workstreams.yml \
            packs/sa/solution-index.yml \
            packs/da/domain-implementations.yml
