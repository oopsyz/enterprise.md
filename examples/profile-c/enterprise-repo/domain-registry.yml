# EA authoritative domain governance map.
# Keep this file in EA repo at: architecture/enterprise/domain-registry.yml

version: "1.0"
enterprise_id: ent-acme

domains:
  - domain_id: order
    name: Order Management
    owner: order-team
    domain_repo_url: https://github.com/acme/domain-order
    domain_entrypoint: DOMAIN.md
    status: active
    capabilities:
      - capability_id: cap-order-capture
        name: Capture and validate customer orders
    standards:
      frameworks: []
      policies:
        - canonical_order_lifecycle_required
    target_state:
      principles:
        - Expose canonical order lifecycle APIs/events.
      constraints:
        - Domain emits lifecycle events for all state transitions.

  - domain_id: billing
    name: Billing & Invoicing
    owner: billing-team
    domain_repo_url: https://github.com/acme/domain-billing
    domain_entrypoint: DOMAIN.md
    status: active
    capabilities:
      - capability_id: cap-billing-generation
        name: Generate and manage invoices
    standards:
      frameworks: []
      policies: []
    target_state:
      principles:
        - Expose canonical billing APIs/events.
      constraints: []
