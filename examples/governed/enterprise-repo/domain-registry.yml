# EA authoritative domain governance map.
# Keep this file in EA repo at: architecture/enterprise/domain-registry.yml

spec_name: domain-registry
spec_version: "2.0.0"
enterprise_id: ent-acme

domains:
  - domain_id: order
    name: Order Management
    owner: order-team
    entry_type: domain
    domain_repo_url: https://github.com/acme/domain-order
    domain_entrypoint: DOMAIN.md
    domain_git_ref: main
    status: active
    capabilities:
      - capability_id: cap-order-capture
        name: Capture and validate customer orders
    standards:
      frameworks: []
      policies:
        - canonical_order_lifecycle_required
    target_state:
      principles:
        - Expose canonical order lifecycle APIs/events.
      constraints:
        - Domain emits lifecycle events for all state transitions.

  - domain_id: billing
    name: Billing & Invoicing
    owner: billing-team
    entry_type: domain
    domain_repo_url: https://github.com/acme/domain-billing
    domain_entrypoint: DOMAIN.md
    domain_git_ref: main
    status: active
    capabilities:
      - capability_id: cap-billing-generation
        name: Generate and manage invoices
    standards:
      frameworks: []
      policies: []
    target_state:
      principles:
        - Expose canonical billing APIs/events.
      constraints: []

  - domain_id: architecture-standards
    name: Architecture Standards and Patterns
    owner: enterprise-architecture
    entry_type: standards_provider
    domain_repo_url: https://github.com/acme/enterprise-architecture
    domain_git_ref: main
    status: active
    standards_provider:
      enterprise_default: true
      entrypoint: STANDARDS.md
      pattern_index_ref: architecture/patterns/pattern-index.yml
