# EA authoritative domain governance map.
# Keep this file in EA repo at: architecture/enterprise/domain-registry.yml

version: "1.0"
enterprise_id: <enterprise-id>

domains:
  - domain_id: <domain-id>
    name: <domain-name>
    owner: <domain-owner>
    domain_repo_url: https://github.com/<org>/<domain-repo>
    domain_entrypoint: DOMAIN.md
    status: active
    capabilities:
      - capability_id: <cap-id>
        name: <capability description>
    metadata: {}
